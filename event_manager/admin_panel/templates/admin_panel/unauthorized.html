{% extends "base.html" %}

{% block title %}Unauthorized | Eventify{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="w-20 h-20 rounded-2xl bg-red-50 flex items-center justify-center mx-auto mb-6">
            <i data-lucide="shield-off" class="w-10 h-10 text-red-500"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-900 mb-3">Access Denied</h1>
        <p class="text-slate-500 mb-8">
            You don't have permission to view this page. This area is restricted to organizers only.
        </p>
        <a href="/dashboard/"
           class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Dashboard
        </a>
    </div>
</section>
{% endblock %}
