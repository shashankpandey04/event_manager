{% extends 'base.html' %}
{% block title %}Edit Event | Eventify{% endblock %}
{% block content %}
<section class="max-w-xl mx-auto py-12 px-4">
    <h1 class="font-display text-3xl font-bold text-slate-900 mb-8">Edit Event</h1>
    {% if error == '403' %}
        <div class="mb-6 p-4 bg-red-100 text-red-700 rounded-lg">You do not have permission to edit events.</div>
    {% endif %}
    <form method="post" class="space-y-6 bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
            <input type="text" name="title" value="{{ event.title }}" required class="w-full border border-slate-300 rounded-lg px-4 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
            <textarea name="description" required class="w-full border border-slate-300 rounded-lg px-4 py-2">{{ event.description }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Location</label>
            <input type="text" name="location" value="{{ event.location }}" required class="w-full border border-slate-300 rounded-lg px-4 py-2">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Time</label>
                <input type="datetime-local" name="startTime" value="{{ event.startTime|date:'Y-m-d\\TH:i' }}" required class="w-full border border-slate-300 rounded-lg px-4 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">End Time</label>
                <input type="datetime-local" name="endTime" value="{{ event.endTime|date:'Y-m-d\\TH:i' }}" required class="w-full border border-slate-300 rounded-lg px-4 py-2">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Capacity</label>
            <input type="number" name="capacity" value="{{ event.capacity }}" min="1" class="w-full border border-slate-300 rounded-lg px-4 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
            <select name="status" class="w-full border border-slate-300 rounded-lg px-4 py-2">
                <option value="draft" {% if event.status == 'draft' %}selected{% endif %}>Draft</option>
                <option value="published" {% if event.status == 'published' %}selected{% endif %}>Published</option>
                <option value="cancelled" {% if event.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                <option value="expired" {% if event.status == 'expired' %}selected{% endif %}>Expired</option>
            </select>
        </div>
        <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-lg">
            <input type="checkbox" name="attendanceEnabled" id="attendanceEnabled" 
                   {% if event.attendanceEnabled %}checked{% endif %}
                   class="w-4 h-4 text-indigo-600 border-slate-300 rounded">
            <label for="attendanceEnabled" class="text-sm font-medium text-slate-700">
                Enable attendance tracking for this event
            </label>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="flex-1 btn-premium py-3 rounded-xl text-white font-semibold text-lg">Update Event</button>
            <a href="/events/{{ event.id }}/volunteers/" 
               class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl bg-slate-100 text-slate-700 font-semibold hover:bg-slate-200 transition">
                <i data-lucide="users" class="w-5 h-5"></i>
                Volunteers
            </a>
        </div>
    </form>
</section>
{% endblock %}
